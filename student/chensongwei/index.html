<script>
document.addEventListener('DOMContentLoaded', function () {
  const navLinks = document.querySelectorAll('.navbar-nav .nav-link');
  const currentPath = window.location.pathname;

  function clearAllActive() {
    navLinks.forEach(link => link.classList.remove('active'));
  }

  
  navLinks.forEach(link => {
    const href = link.getAttribute('href');
    if ((href === './' || href === '/') && (currentPath === '/' || currentPath === '')) {
      link.classList.add('active');
    } else if (!href.startsWith('#') && currentPath.startsWith('/' + href)) {
      link.classList.add('active');
    }
    
    link.addEventListener('click', function () {
      clearAllActive();
      this.classList.add('active');
    })
  });

  
  setTimeout(function(){
    if (typeof busuanzi_value_site_pv === 'undefined') {
      const pvBox = document.getElementById('busuanzi_container_site_pv');
      if(pvBox) pvBox.style.display = 'none';
    }
  }, 800);
});
</script>
